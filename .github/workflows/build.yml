name: Build Snake Game APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet
    
    - name: Create main.py
      run: |
        cat > main.py << 'EOF'
import flet as ft
import random

def main(page: ft.Page):
    page.title = "Snake Game"
    page.bgcolor = ft.Colors.BLACK
    page.window_width = 400
    page.window_height = 500
    
    grid_size = 20
    cell_size = 20
    snake = [(10, 10), (9, 10), (8, 10)]
    direction = (1, 0)
    food = (15, 10)
    score = 0
    best_score = 0
    game_running = True
    
    def random_food():
        while True:
            f = (random.randint(0, grid_size-1), random.randint(0, grid_size-1))
            if f not in snake:
                return f
    
    food = random_food()
    
    # إنشاء واجهة اللعبة
    game_grid = ft.GridView(runs_count=grid_size, spacing=0, run_spacing=0)
    game_container = ft.Container(content=game_grid, bgcolor=ft.Colors.BLACK, border=ft.border.all(2, ft.Colors.GREEN))
    
    score_text = ft.Text(f"SCORE: {score}", size=20, color=ft.Colors.WHITE)
    best_text = ft.Text(f"BEST: {best_score}", size=20, color=ft.Colors.YELLOW)
    
    def draw_grid():
        tiles = []
        for y in range(grid_size):
            for x in range(grid_size):
                color = ft.Colors.BLACK
                if (x, y) == food:
                    color = ft.Colors.RED
                elif (x, y) == snake[0]:
                    color = ft.Colors.GREEN_700
                elif (x, y) in snake:
                    color = ft.Colors.GREEN_400
                tiles.append(ft.Container(width=cell_size, height=cell_size, bgcolor=color, border=ft.border.all(0.5, ft.Colors.GREY_800)))
        game_grid.controls = tiles
        page.update()
    
    def change_direction(dx, dy):
        nonlocal direction, game_running
        if game_running and (dx, dy) != (-direction[0], -direction[1]):
            direction = (dx, dy)
    
    def game_over():
        nonlocal game_running
        game_running = False
        page.add(ft.Text("GAME OVER", size=30, color=ft.Colors.RED, weight=ft.FontWeight.BOLD))
        restart_btn = ft.ElevatedButton("PLAY AGAIN", on_click=lambda e: restart())
        page.add(restart_btn)
        page.update()
    
    def restart():
        page.clean()
        main(page)
    
    def update():
        nonlocal snake, food, score, best_score, game_running
        if not game_running:
            return
        
        head = snake[0]
        new_head = (head[0] + direction[0], head[1] + direction[1])
        
        if new_head == food:
            snake.insert(0, new_head)
            food = random_food()
            score += 1
            if score > best_score:
                best_score = score
                best_text.value = f"BEST: {best_score}"
            score_text.value = f"SCORE: {score}"
        else:
            snake.insert(0, new_head)
            snake.pop()
        
        if (new_head[0] < 0 or new_head[0] >= grid_size or
            new_head[1] < 0 or new_head[1] >= grid_size or
            new_head in snake[1:]):
            game_over()
            return
        
        draw_grid()
        page.run_task(update, delay=0.15)
    
    # أزرار التحكم
    up_btn = ft.IconButton(ft.icons.ARROW_UP, on_click=lambda e: change_direction(0, -1))
    down_btn = ft.IconButton(ft.icons.ARROW_DOWN, on_click=lambda e: change_direction(0, 1))
    left_btn = ft.IconButton(ft.icons.ARROW_LEFT, on_click=lambda e: change_direction(-1, 0))
    right_btn = ft.IconButton(ft.icons.ARROW_RIGHT, on_click=lambda e: change_direction(1, 0))
    
    page.add(
        ft.Column([
            ft.Row([score_text, best_text], alignment=ft.MainAxisAlignment.SPACE_BETWEEN),
            game_container,
            ft.Row([up_btn], alignment=ft.MainAxisAlignment.CENTER),
            ft.Row([left_btn, down_btn, right_btn], alignment=ft.MainAxisAlignment.CENTER),
        ], horizontal_alignment=ft.CrossAxisAlignment.CENTER)
    )
    
    draw_grid()
    update()

ft.app(target=main)
EOF
    
    - name: Create requirements.txt
      run: |
        echo "flet" > requirements.txt
    
    - name: Build APK with Flet
      run: |
        flet build apk --verbose
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: snake-game
        path: build/apk/*.apk

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: snake-game-aab
        path: build/aab/*.aab
